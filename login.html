<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADLIYA - Kirish</title>
  <link rel="icon" type="image/png" href="img/icon.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  
  <div class="login-container">
    <!-- Left Side -->
    <div class="login-left">
      <img src="img/icon.png" alt="O'zbekiston gerbi" class="gerb">
      <h1>O'zbekiston Respublikasi</h1>
      <h2>Adliya vazirligi</h2>
    </div>
    
    <!-- Right Side -->
    <div class="login-right">
      <form class="login-form" id="loginForm">
        <h2>Kirish</h2>
        
        <div class="input-group">
          <input type="email" class="input" placeholder="adminc_email@gmail.com" required>
        </div>
        
        <div class="input-group">
          <div class="input-with-icon">
            <input type="password" class="input" id="passwordInput" placeholder="Parol" required>
            <button type="button" class="password-toggle" id="passwordToggle">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        
        <div class="input-group">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" style="width: auto;">
            <span style="font-size: 14px; color: var(--gray-600);">Meni eslab qolish</span>
          </label>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">
          Kirish
        </button>
        
        <a href="sms-verification.html" class="forgot-link">Parolni unutdingizmi?</a>
      </form>
    </div>
  </div>
  
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
