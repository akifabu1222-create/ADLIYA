<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADLIYA - Parolni Yangilash</title>
  <link rel="icon" type="image/png" href="img/icon.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  
  <div class="password-reset-container">
    <!-- Left Side -->
    <div class="password-reset-left">
      <img src="img/icon.png" alt="O'zbekiston gerbi" class="gerb">
      <h1>O'zbekiston Respublikasi</h1>
      <h2>Adliya vazirligi</h2>
      
      <div class="sms-progress">
        <div class="progress-item">
          SMS tasdiqlash
        </div>
        <div class="progress-item active">
          Parolni yangilash
        </div>
        <div class="progress-item">
          Muvaffaqiyatli bajarildi
        </div>
      </div>
    </div>
    
    <!-- Right Side -->
    <div class="password-reset-right">
      <form class="password-reset-form" id="passwordResetForm">
        <h2>Parolni yangilash</h2>
        
        <div class="input-group">
          <label class="input-label">Yangi parolni kiriting</label>
          <div class="input-with-icon">
            <input type="password" class="input" id="newPassword" placeholder="Yangi parol" required>
            <button type="button" class="password-toggle" id="toggleNewPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="password-strength" id="passwordStrength"></div>
        </div>
        
        <div class="input-group">
          <label class="input-label">Yangi parolni tasdiqlang</label>
          <div class="input-with-icon">
            <input type="password" class="input" id="confirmPassword" placeholder="Parolni tasdiqlang" required>
            <button type="button" class="password-toggle" id="toggleConfirmPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">
          Saqlash
        </button>
      </form>
    </div>
  </div>
  
  <script src="js/password-reset.js"></script>
</body>
</html>
