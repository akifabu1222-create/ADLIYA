  <script>
    // Initialize authentication and update user menu
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof initAuth === 'function') {
        initAuth();
      }
    });
  </script>
  <script>
    // Sample districts data
    const districts = [
      { id: 1, name: 'Yunusobod tumani', population: 285000, status: 'green' },
      { id: 2, name: 'Mirzo-Ulug\'bek tumani', population: 320000, status: 'green' },
      { id: 3, name: 'Olmazor tumani', population: 185000, status: 'yellow' },
      { id: 4, name: 'Shayxontohur tumani', population: 360000, status: 'green' },
      { id: 5, name: 'Uchtepa tumani', population: 130000, status: 'yellow' },
      { id: 6, name: 'Yakkasaroy tumani', population: 320000, status: 'green' },
      { id: 7, name: 'Chilonzor tumani', population: 950000, status: 'yellow' },
      { id: 8, name: 'Sergeli tumani', population: 270000, status: 'green' },
      { id: 9, name: 'Bektemir tumani', population: 380000, status: 'green' },
      { id: 10, name: 'Mirobod tumani', population: 85000, status: 'red' },
      { id: 11, name: 'Sirdaryo tumani', population: 250000, status: 'yellow' },
      { id: 12, name: 'Xovos tumani', population: 250000, status: 'green' },
      { id: 13, name: 'Sayhunobod tumani', population: 180000, status: 'yellow' },
      { id: 14, name: 'Guliston tumani', population: 190000, status: 'red' },
      { id: 15, name: 'Mirzaobod tumani', population: 220000, status: 'green' },
      { id: 16, name: 'Oqoltin tumani', population: 150000, status: 'yellow' },
      { id: 17, name: 'Sardoba tumani', population: 175000, status: 'yellow' },
      { id: 18, name: 'Yangiobod tumani', population: 210000, status: 'green' },
      { id: 19, name: 'Paxtaobod tumani', population: 195000, status: 'green' },
      { id: 20, name: 'Boyovut tumani', population: 165000, status: 'red' },
      { id: 21, name: 'Guliston shahri', population: 280000, status: 'green' },
      { id: 22, name: 'Shirin shahri', population: 240000, status: 'yellow' },
      { id: 23, name: 'Yangiyer shahri', population: 200000, status: 'green' },
      { id: 24, name: 'Bekobod tumani', population: 310000, status: 'green' },
      { id: 25, name: 'Chinoz tumani', population: 180000, status: 'yellow' },
      { id: 26, name: 'Parkent tumani', population: 145000, status: 'red' },
      { id: 27, name: 'Piskent tumani', population: 195000, status: 'green' },
      { id: 28, name: 'Qibray tumani', population: 225000, status: 'yellow' },
      { id: 29, name: 'Oltiariq tumani', population: 245000, status: 'yellow' },
      { id: 30, name: 'Qiziltepa tumani', population: 215000, status: 'green' },
      { id: 31, name: 'Qo\'qon tumani', population: 245000, status: 'yellow' },
    ];
    
    // Chart colors
    const chartColors = {
      green: '#10B981',
      yellow: '#FBBF24',
      red: '#EF4444'
    };
    
    document.addEventListener('DOMContentLoaded', function() {
      const grid = document.getElementById('districtsGrid');
      
      // Generate district cards
      districts.forEach((district, index) => {
        const card = document.createElement('div');
        card.className = `murojaat-card ${district.status}`;
        card.innerHTML = `
          <div class="murojaat-card-title">${district.name}</div>
          <div class="murojaat-card-number">${(district.population / 1000).toFixed(0)}k</div>
          <div class="murojaat-card-label">nafar</div>
          <canvas id="districtChart${district.id}" class="murojaat-mini-chart"></canvas>
        `;
        grid.appendChild(card);
      });
      
      // Initialize charts
      function initCharts() {
        if (typeof Chart === 'undefined') {
          setTimeout(initCharts, 100);
          return;
        }
        
        districts.forEach(district => {
          const color = chartColors[district.status];
          createMiniChart('districtChart' + district.id, color);
        });
      }
      
      initCharts();
      
      // Search functionality
      const searchInput = document.getElementById('globalSearch');
      if (searchInput) {
        searchInput.addEventListener('input', function(e) {
          const searchTerm = e.target.value.toLowerCase();
          const cards = grid.querySelectorAll('.murojaat-card');
          
          cards.forEach(card => {
            const title = card.querySelector('.murojaat-card-title').textContent.toLowerCase();
            if (title.includes(searchTerm)) {
              card.style.display = 'block';
            } else {
              card.style.display = 'none';
            }
          });
        });
      }
    });
  </script>
</body>
