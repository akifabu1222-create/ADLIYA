<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADLIYA - Ideal Mahalla</title>
  <link rel="icon" type="image/png" href="img/icon.png">

  <!-- Chart.js - FIRST! -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">  
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/avatars.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/charts.css">
</head>
<body>
  
  <div class="page-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="img/icon.png" alt="O'zbekiston gerbi" class="gerb">
        <h3>O'zbekiston Respublikasi<br>Adliya vazirligi</h3>
      </div>
      
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <i class="fas fa-chart-line"></i>
          <span>Statistika</span>
        </a>
        <a href="ideal-mahalla.html" class="nav-item active">
          <i class="fas fa-star"></i>
          <span>Ideal mahalla</span>
        </a>
        <a href="murojaatlar.html" class="nav-item">
          <i class="fas fa-comments"></i>
          <span>Murojaatlar</span>
        </a>
        <a href="viloyatlar.html" class="nav-item">
          <i class="fas fa-map-marked-alt"></i>
          <span>Viloyatlar</span>
        </a>
        <a href="tumanlar.html" class="nav-item">
          <i class="fas fa-city"></i>
          <span>Tumanlar</span>
        </a>
        <a href="mahallalar.html" class="nav-item">
          <i class="fas fa-home"></i>
          <span>Mahallalar</span>
        </a>
        <a href="fuqorolar.html" class="nav-item">
          <i class="fas fa-users"></i>
          <span>Fuqorolar</span>
        </a>
        <a href="xodimlar.html" class="nav-item">
          <i class="fas fa-user-tie"></i>
          <span>Xodimlar</span>
        </a>
      </nav>
      
      <button class="logout-btn" onclick="window.location.href='login.html'">
        <i class="fas fa-sign-out-alt"></i>
        <span>Chiqish</span>
      </button>
    </aside>
    
    <!-- Main Content -->
    <div class="main-wrapper">
      <!-- Header -->
      <header class="header">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Qidiruv..." id="globalSearch">
        </div>
        
        <div class="header-actions">
          <button class="notification-btn">
            <i class="fas fa-bell"></i>
            <span class="badge">3</span>
          </button>
          
          <div class="user-menu" id="userMenu">
            <div class="user-avatar-placeholder" id="userAvatar">U</div>
            <span id="userName">Foydalanuvchi</span>
            <i class="fas fa-chevron-down"></i>
          </div>
        </div>
      </header>
      
      <!-- Content -->
      <main class="content">
        <div class="breadcrumb">
          Ideal mahalla
        </div>
        
        <div class="filters">
          <div class="filter-item">
            <label>Yil:</label>
            <select>
              <option>2024</option>
              <option>2023</option>
            </select>
          </div>
          <div class="filter-item">
            <label>Viloyat:</label>
            <select>
              <option>Guliston</option>
              <option>Toshkent</option>
            </select>
          </div>
        </div>
        
        <h1 class="page-title">Ideal mahalla</h1>
        
        <div class="stats-cards">
          <div class="stat-card green">
            <div class="stat-card-number">150k</div>
            <div class="stat-card-label">Yashil toifa</div>
            <canvas id="greenChart" class="murojaat-mini-chart"></canvas>
          </div>
          
          <div class="stat-card yellow">
            <div class="stat-card-number">95k</div>
            <div class="stat-card-label">Sariq toifa</div>
            <canvas id="yellowChart" class="murojaat-mini-chart"></canvas>
          </div>
          
          <div class="stat-card red">
            <div class="stat-card-number">60k</div>
            <div class="stat-card-label">Qizil toifa</div>
            <canvas id="redChart" class="murojaat-mini-chart"></canvas>
          </div>
        </div>
        
        <div class="chart-container">
          <h3>Aholining o'sish darajasi</h3>
          <div class="chart-wrapper">
            <canvas id="populationChart"></canvas>
          </div>
        </div>
        
        <div class="card" style="text-align: center; padding: 48px;">
          <h3 style="font-size: 24px; margin-bottom: 16px;">Mahalla soni</h3>
          <p style="color: var(--gray-600); margin-bottom: 24px;">Alohida tuman kesimida</p>
          <div style="font-size: 48px; font-weight: 700; color: var(--primary-blue);">500 ta</div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/charts.js"></script>
  <script>
    // Initialize authentication and update user menu
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof initAuth === 'function') {
        initAuth();
      }
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      function initCharts() {
        if (typeof Chart === 'undefined') {
          setTimeout(initCharts, 100);
          return;
        }
        
        // Mini charts
        createMiniChart('greenChart', '#10B981');
        createMiniChart('yellowChart', '#FBBF24');
        createMiniChart('redChart', '#EF4444');
        
        // Population chart
        const ctx = document.getElementById('populationChart');
        if (ctx) {
          ctx.height = 300;
          new Chart(ctx.getContext('2d'), {
            type: 'bar',
            data: {
              labels: ['0-7 yosh', '8-18 yosh', '19-30 yosh', '31-45 yosh', '46-60 yosh', '61-100 yosh'],
              datasets: [
                {
                  label: '2022',
                  data: [320000, 200000, 100000, 140000, 160000, 100000],
                  backgroundColor: 'rgba(46, 90, 138, 0.8)',
                },
                {
                  label: '2023',
                  data: [350000, 250000, 120000, 150000, 120000, 90000],
                  backgroundColor: 'rgba(74, 144, 226, 0.8)',
                },
                {
                  label: '2024',
                  data: [300000, 180000, 100000, 160000, 180000, 110000],
                  backgroundColor: 'rgba(46, 90, 138, 0.8)',
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  display: true,
                  position: 'top'
                }
              },
              scales: {
                y: {
                  beginAtZero: true,
                  max: 400000,
                  ticks: {
                    callback: value => `${value / 1000}k`
                  }
                }
              }
            }
          });
        }
      }
      
      initCharts();
    });
  </script>
</body>
</html>
