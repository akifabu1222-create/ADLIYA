<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADLIYA - Profil - Yaqinlari</title>
  <link rel="icon" type="image/png" href="img/icon.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/avatars.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  
  <div class="page-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="img/icon.png" alt="O'zbekiston gerbi" class="gerb">
        <h3>O'zbekiston Respublikasi<br>Adliya vazirligi</h3>
      </div>
      
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <i class="fas fa-chart-line"></i>
          <span>Statistika</span>
        </a>
        <a href="viloyatlar.html" class="nav-item">
          <i class="fas fa-map-marked-alt"></i>
          <span>Viloyatlar</span>
        </a>
        <a href="tumanlar.html" class="nav-item">
          <i class="fas fa-city"></i>
          <span>Tumanlar</span>
        </a>
        <a href="mahallalar.html" class="nav-item">
          <i class="fas fa-home"></i>
          <span>Mahallalar</span>
        </a>
        <a href="fuqorolar.html" class="nav-item">
          <i class="fas fa-users"></i>
          <span>Fuqorolar</span>
        </a>
        <a href="xodimlar.html" class="nav-item">
          <i class="fas fa-user-tie"></i>
          <span>Xodimlar</span>
        </a>
      </nav>
      
      <button class="logout-btn" onclick="window.location.href='login.html'">
        <i class="fas fa-sign-out-alt"></i>
        <span>Chiqish</span>
      </button>
    </aside>
    
    <!-- Main Content -->
    <div class="main-wrapper">
      <!-- Header -->
      <header class="header">
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
        
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Qidiruv..." id="globalSearch">
        </div>
        
        <div class="header-actions">
          <button class="notification-btn">
            <i class="fas fa-bell"></i>
            <span class="badge">3</span>
          </button>
          
          <div class="user-menu" id="userMenu">
            <div class="user-avatar-placeholder" id="userAvatar">U</div>
            <span id="userName">Foydalanuvchi</span>
            <i class="fas fa-chevron-down"></i>
          </div>
        </div>
      </header>
      
      <!-- Content -->
      <main class="content">
        <h1 class="profile-name" id="profileName"></h1>
        
        <div class="profile-tabs">
          <button class="profile-tab" id="tabPersonal">Fuqoro haqida</button>
          <button class="profile-tab" id="tabFamily">Fuqoroning oilaviy ahvoli</button>
          <button class="profile-tab active" id="tabRelatives">Fuqoroning yaqinlari haqida ma'lumotlar</button>
        </div>
        
        <div class="profile-content">
          <div class="profile-section">
            <h3>Fuqoroning yaqinlari haqida</h3>
            
            <table class="relatives-table">
              <thead>
                <tr>
                  <th>Surat</th>
                  <th>F.I.Sh</th>
                  <th>Qarindoshligi</th>
                  <th>Tug'ilgan sana</th>
                  <th>Manzil</th>
                </tr>
              </thead>
              <tbody id="relativesTableBody">
                <!-- Relatives will be generated dynamically by JavaScript -->
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="js/auth.js"></script>
  <script src="js/profile-data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    // Initialize authentication and update user menu
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof initAuth === 'function') {
        initAuth();
      }
    });
  </script>
  <script>
    // Load profile data - ALL tabs use SAME person's data
    const urlParams = new URLSearchParams(window.location.search);
    const userId = parseInt(urlParams.get('id')) || 5;
    const userData = getUserData(userId);
    const relatives = getRelativesData(userId);
    
    // Update page with SAME person's data - CRITICAL: Keep name constant
    document.getElementById('profileName').textContent = `${userData.surname} ${userData.name}`;
    
    // Tab navigation - preserve user ID
    document.getElementById('tabPersonal').onclick = function() {
      window.location.href = `profile-main.html?id=${userId}`;
    };
    document.getElementById('tabFamily').onclick = function() {
      window.location.href = `profile-family.html?id=${userId}`;
    };
    
    // Generate relatives table - using SAME person's relatives
    const tableBody = document.getElementById('relativesTableBody');
    relatives.forEach(relative => {
      const row = document.createElement('tr');
      // Use first letter of first word (family name) for avatar
      const initial = relative.name.split(' ')[0].charAt(0).toUpperCase();
      
      row.innerHTML = `
        <td>
          <div class="relative-info">
            <div class="avatar-placeholder small color-${relative.color}">${initial}</div>
          </div>
        </td>
        <td>
          <div class="relative-details">
            <div class="relative-name">${relative.name}</div>
          </div>
        </td>
        <td>${relative.relation}</td>
        <td>${relative.birthdate}</td>
        <td>${relative.location}</td>
      `;
      tableBody.appendChild(row);
    });
  </script>
</body>
</html>
